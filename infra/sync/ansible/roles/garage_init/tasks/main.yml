---
# One-time cluster bootstrap — run via setup-garage.yml
# Idempotent: skips bucket/key creation if they already exist (replicated metadata)
# Uses Garage v2 admin HTTP API instead of CLI (avoids Docker networking issues)

- name: Wait for Garage admin API
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 3903
    timeout: 60

# --- Discover node IDs (runs on every node) ---

- name: Get cluster status
  ansible.builtin.uri:
    url: "{{ garage_admin_url }}/v2/GetClusterStatus"
    method: GET
    headers: "{{ garage_admin_headers }}"
    return_content: true
  register: cluster_status

- name: Find local node in cluster status
  ansible.builtin.set_fact:
    local_node: "{{ cluster_status.json.nodes | selectattr('addr', 'equalto', garage_rpc_public_addr) | first }}"

- name: Set node ID facts
  ansible.builtin.set_fact:
    discovered_garage_node_hex: "{{ local_node.id }}"
    discovered_garage_node_id: "{{ local_node.id }}@{{ garage_rpc_public_addr }}"

- name: Display node ID
  ansible.builtin.debug:
    msg: "{{ inventory_hostname }}: {{ discovered_garage_node_id }}"

# --- Cluster setup (delegated to first node) ---

- name: Connect to all peers
  ansible.builtin.uri:
    url: "{{ garage_admin_url }}/v2/ConnectClusterNodes"
    method: POST
    headers: "{{ garage_admin_headers }}"
    body_format: json
    body:
      - "{{ hostvars[item]['discovered_garage_node_hex'] }}@{{ hostvars[item]['garage_rpc_public_addr'] }}"
    status_code: [200]
    return_content: true
  loop: "{{ groups['sync_nodes'] }}"
  when:
    - inventory_hostname == groups['sync_nodes'][0]
    - item != inventory_hostname
  changed_when: false

- name: Build layout assignment
  ansible.builtin.set_fact:
    garage_layout_roles: "{{ garage_layout_roles | default([]) + [{'id': hostvars[item]['discovered_garage_node_hex'], 'zone': hostvars[item]['garage_zone'], 'capacity': hostvars[item]['garage_capacity'] | int * 1073741824, 'tags': [item]}] }}"
  loop: "{{ groups['sync_nodes'] }}"
  when: inventory_hostname == groups['sync_nodes'][0]

- name: Assign layout for all nodes
  ansible.builtin.uri:
    url: "{{ garage_admin_url }}/v2/UpdateClusterLayout"
    method: POST
    headers: "{{ garage_admin_headers }}"
    body_format: json
    body:
      roles: "{{ garage_layout_roles }}"
    status_code: [200, 204, 500]
    return_content: true
  register: layout_assign
  when: inventory_hostname == groups['sync_nodes'][0]
  changed_when: layout_assign.status in [200, 204]

- name: Get current layout version
  ansible.builtin.uri:
    url: "{{ garage_admin_url }}/v2/GetClusterLayout"
    method: GET
    headers: "{{ garage_admin_headers }}"
    return_content: true
  register: cluster_layout
  when: inventory_hostname == groups['sync_nodes'][0]

- name: Apply layout
  ansible.builtin.uri:
    url: "{{ garage_admin_url }}/v2/ApplyClusterLayout"
    method: POST
    headers: "{{ garage_admin_headers }}"
    body_format: json
    body:
      version: "{{ (cluster_layout.json.version | default(0) | int) + 1 }}"
    status_code: [200, 204]
    return_content: true
  when:
    - inventory_hostname == groups['sync_nodes'][0]
    - cluster_layout.json.stagedRoleChanges | default([]) | length > 0
  changed_when: true

# --- Bucket (idempotent — skipped if already exists via replication) ---

- name: Check if bucket exists
  ansible.builtin.uri:
    url: "{{ garage_admin_url }}/v2/GetBucketInfo?globalAlias={{ s3_bucket }}"
    method: GET
    headers: "{{ garage_admin_headers }}"
    return_content: true
    status_code: [200, 404]
  register: bucket_check
  when: inventory_hostname == groups['sync_nodes'][0]

- name: Create S3 bucket
  ansible.builtin.uri:
    url: "{{ garage_admin_url }}/v2/CreateBucket"
    method: POST
    headers: "{{ garage_admin_headers }}"
    body_format: json
    body:
      globalAlias: "{{ s3_bucket }}"
    status_code: [200]
    return_content: true
  register: bucket_create
  when:
    - inventory_hostname == groups['sync_nodes'][0]
    - bucket_check.status == 404

- name: Set bucket ID fact
  ansible.builtin.set_fact:
    garage_bucket_id: "{{ bucket_create.json.id if bucket_check.status == 404 else bucket_check.json.id }}"
  when: inventory_hostname == groups['sync_nodes'][0]

# --- API key (idempotent — skipped if already exists via replication) ---

- name: Check if API key exists
  ansible.builtin.uri:
    url: "{{ garage_admin_url }}/v2/GetKeyInfo?search={{ garage_s3_key_name }}"
    method: GET
    headers: "{{ garage_admin_headers }}"
    return_content: true
    status_code: [200, 400, 404]
  register: key_check
  when: inventory_hostname == groups['sync_nodes'][0]

- name: Create S3 API key
  ansible.builtin.uri:
    url: "{{ garage_admin_url }}/v2/CreateKey"
    method: POST
    headers: "{{ garage_admin_headers }}"
    body_format: json
    body:
      name: "{{ garage_s3_key_name }}"
    status_code: [200]
    return_content: true
  register: key_create
  when:
    - inventory_hostname == groups['sync_nodes'][0]
    - key_check.status != 200
  no_log: true

- name: Set API key ID fact
  ansible.builtin.set_fact:
    garage_access_key_id: "{{ key_create.json.accessKeyId if key_check.status != 200 else key_check.json.accessKeyId }}"
  when: inventory_hostname == groups['sync_nodes'][0]
  no_log: true

- name: Grant key access to bucket
  ansible.builtin.uri:
    url: "{{ garage_admin_url }}/v2/AllowBucketKey"
    method: POST
    headers: "{{ garage_admin_headers }}"
    body_format: json
    body:
      bucketId: "{{ garage_bucket_id }}"
      accessKeyId: "{{ garage_access_key_id }}"
      permissions:
        read: true
        write: true
        owner: true
    status_code: [200]
    return_content: true
  when: inventory_hostname == groups['sync_nodes'][0]

# --- Display credentials ---

- name: Display new credentials
  ansible.builtin.debug:
    msg: |
      Save these to vault.yml for this environment!
        cp vault.yml.example inventories/<env>/group_vars/all/vault.yml
        ansible-vault edit inventories/<env>/group_vars/all/vault.yml

      {% if key_check.status != 200 %}
      S3 Access Key ID:     {{ key_create.json.accessKeyId }}
      S3 Secret Access Key: {{ key_create.json.secretAccessKey }}
      {% else %}
      (key already existed — secret not available via API, check vault)
      {% endif %}

      Node IDs for host_vars:
      {% for host in groups['sync_nodes'] %}
        {{ host }}: {{ hostvars[host]['discovered_garage_node_id'] }}
      {% endfor %}
  when: inventory_hostname == groups['sync_nodes'][0]
